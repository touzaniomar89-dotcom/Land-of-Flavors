<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إتمام الطلب - مطعم وذ ذيليشت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-bg: #fff8f2;
      --clr-primary: #e85d04;
      --clr-primary-700: #d9480f;
      --clr-accent: #9c6644;
      --clr-deep: #6c3b2a;
      --clr-card: #fff;
      --radius: 16px;
      --shadow-sm: 0 6px 16px rgba(0,0,0,0.08);
      --container: 900px;
      --transition: 220ms ease;
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Cairo', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 800px at 100% -20%, rgba(232,93,4,0.06), transparent 60%),
                  radial-gradient(1200px 800px at -10% 120%, rgba(156,102,68,0.07), transparent 60%),
                  var(--clr-bg);
      color: #2b2b2b;
      line-height: 1.7;
    }
    .container { width: min(92%, var(--container)); margin-inline: auto; }
    header { padding: 26px 0; }
    .brand { display:flex; align-items:center; gap:12px; }
    .badge { width:40px; height:40px; border-radius:10px; background: conic-gradient(from 210deg, #e85d04, #9c6644, #c1121f, #e85d04); position: relative; box-shadow: 0 6px 20px rgba(232,93,4,0.25); }
    .badge::after { content:""; position:absolute; inset:5px; background:#fff; border-radius:8px; }
    h1 { margin:0; font-size: clamp(22px, 3.4vw, 30px); color: var(--clr-deep); font-weight:800; }
    .muted { color:#78655d; }

    main { padding: 12px 0 46px; }
    .card { background: var(--clr-card); border-radius: var(--radius); box-shadow: var(--shadow-sm); border:1px solid rgba(232,93,4,0.08); padding: 18px; }
    .grid { display:grid; grid-template-columns: 1.2fr 1fr; gap:18px; }

    .section-title { margin: 0 0 10px; color: var(--clr-deep); font-weight:800; font-size: 22px; }
    form { display:grid; gap:12px; }
    .field { display:grid; gap:6px; }
    label { font-weight:700; color: #5a4a43; }
    input[type="text"], input[type="tel"], input[type="email"], select, textarea {
      padding: 12px 12px; border-radius:12px; border:1px solid rgba(156,102,68,0.25); background:#fff; font-size:15px; outline:none; transition: border var(--transition), box-shadow var(--transition);
    }
    textarea { min-height: 90px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(232,93,4,0.15); }

    .row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }

    .btn-primary { appearance:none; border:none; background: linear-gradient(180deg, var(--clr-primary), var(--clr-primary-700)); color:#fff; padding: 12px 22px; border-radius:999px; font-weight:800; cursor:pointer; box-shadow: 0 10px 22px rgba(232,93,4,0.35); transition: transform var(--transition), box-shadow var(--transition); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 26px rgba(232,93,4,0.45); }

    .summary { display:grid; gap:10px; }
    .summary-item { display:flex; justify-content: space-between; align-items:center; padding:10px 12px; border-radius:12px; background:#fff7f1; border:1px solid rgba(232,93,4,0.12); }
    .total { font-weight:800; color: var(--clr-deep); }

    footer { text-align:center; color:#4b3a33; font-size: 13px; padding: 18px 0 28px; }

    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container brand">
      <span class="badge" aria-hidden="true"></span>
      <div>
        <h1>إتمام الطلب</h1>
        <p class="muted">يرجى إدخال بياناتك لإكمال عملية الطلب</p>
      </div>
    </div>
  </header>

  <main>
    <div class="container grid">
      <!-- Form -->
      <section class="card" aria-labelledby="form-title">
        <h2 class="section-title" id="form-title">بيانات العميل والتوصيل</h2>
        <form action="thank-you.html" method="get" novalidate>
          <input type="hidden" id="cart-data" name="cart">
          <div class="row">
            <div class="field">
              <label for="name">الاسم الكامل</label>
              <input id="name" name="name" type="text" placeholder="أدخل اسمك" required>
            </div>
            <div class="field">
              <label for="phone">رقم الهاتف</label>
              <input id="phone" name="phone" type="tel" placeholder="05xxxxxxxx" required pattern="[0-9 +()-]{7,}">
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="email">البريد الإلكتروني (اختياري)</label>
              <input id="email" name="email" type="email" placeholder="name@example.com">
            </div>
            <div class="field">
              <label for="payment">طريقة الدفع</label>
              <select id="payment" name="payment" required>
                <option value="" disabled selected>اختر طريقة الدفع</option>
                <option value="cod">الدفع عند الاستلام</option>
                <option value="card">بطاقة ائتمانية</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="address">العنوان</label>
            <input id="address" name="address" type="text" placeholder="المدينة، الحي، الشارع، رقم المبنى" required>
          </div>

          <div class="field">
            <label for="notes">ملاحظات الطلب (اختياري)</label>
            <textarea id="notes" name="notes" placeholder="أي تفاصيل إضافية للطلب أو التوصيل"></textarea>
          </div>

          <button class="btn-primary" type="submit">تأكيد الطلب</button>
        </form>
      </section>

      <!-- Order Summary (static demo) -->
      <aside class="card" aria-labelledby="summary-title">
        <h2 class="section-title" id="summary-title">ملخص الطلب</h2>
        <div class="summary" id="summary-list"></div>
        <div class="summary" id="summary-total">
          <div class="summary-item total"><span>الإجمالي</span><span><span id="total-amount">0</span> ر.س</span></div>
        </div>
      </aside>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>بالنقر على "تأكيد الطلب" سيتم الانتقال إلى صفحة التأكيد.</p>
      <p><a href="index.html" class="muted" style="text-decoration:none;">العودة إلى الرئيسية</a></p>
    </div>
  </footer>

  <script>
    // قراءة السلة من رابط الصفحة أو من localStorage وعرض الملخص ديناميكياً
    (function(){
      var CART_KEY = 'wdz-cart-v1';
      function parseFromQS(){
        try{
          var p = new URLSearchParams(location.search);
          if(!p.has('cart')) return null;
          return JSON.parse(decodeURIComponent(p.get('cart')));
        }catch(e){ return null; }
      }
      function loadCart(){
        var q = parseFromQS();
        if(q && Array.isArray(q)) return q;
        try{ return JSON.parse(localStorage.getItem(CART_KEY))||[] }catch(e){ return [] }
      }

      var cart = loadCart();
      var list = document.getElementById('summary-list');
      var totalEl = document.getElementById('total-amount');
      var submitBtn = document.querySelector('button.btn-primary[type="submit"]');
      var hidden = document.getElementById('cart-data');

      function render(){
        if(!list) return;
        list.innerHTML = '';
        var total = 0;
        if(!cart || cart.length===0){
          list.innerHTML = '<div class="summary-item"><span>السلة فارغة</span><span>0 ر.س</span></div>';
          if(submitBtn) submitBtn.disabled = true;
        } else {
          if(submitBtn) submitBtn.disabled = false;
          cart.forEach(function(it){
            var li = document.createElement('div');
            li.className = 'summary-item';
            var name = document.createElement('span');
            name.textContent = (it.name||'منتج') + ' × ' + (it.qty||1);
            var price = document.createElement('span');
            var line = (Number(it.price)||0) * (it.qty||1);
            price.textContent = line.toFixed(0) + ' ر.س';
            li.appendChild(name); li.appendChild(price);
            list.appendChild(li);
            total += line;
          });
        }
        if(totalEl) totalEl.textContent = total.toFixed(0);
        if(hidden) hidden.value = JSON.stringify(cart||[]);
      }

      render();
    })();
  </script>
</body>
</html>
