<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تم استلام طلبك - مطعم وذ ذيليشت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-bg: #fff8f2;
      --clr-primary: #e85d04;
      --clr-primary-700: #d9480f;
      --clr-accent: #9c6644;
      --clr-deep: #6c3b2a;
      --clr-card: #fff;
      --radius: 16px;
      --shadow-sm: 0 6px 16px rgba(0,0,0,0.08);
      --transition: 220ms ease;
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; min-height:100dvh; display:grid; grid-template-rows:auto 1fr auto;
      font-family: 'Cairo', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 800px at 100% -20%, rgba(232,93,4,0.06), transparent 60%),
                  radial-gradient(1200px 800px at -10% 120%, rgba(156,102,68,0.07), transparent 60%),
                  var(--clr-bg);
      color: #2b2b2b; line-height: 1.7;
    }
    .container { width: min(92%, 820px); margin-inline: auto; }
    header { padding: 26px 0; }
    .brand { display:flex; align-items:center; gap:12px; }
    .badge { width:40px; height:40px; border-radius:10px; background: conic-gradient(from 210deg, #e85d04, #9c6644, #c1121f, #e85d04); position: relative; box-shadow: 0 6px 20px rgba(232,93,4,0.25); }
    .badge::after { content:""; position:absolute; inset:5px; background:#fff; border-radius:8px; }
    h1 { margin:0; font-size: clamp(22px, 3.2vw, 28px); color: var(--clr-deep); font-weight:800; }

    main { display:grid; place-items:center; padding: 18px 0 34px; }
    .panel { background: var(--clr-card); border:1px solid rgba(232,93,4,0.10); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 24px; text-align:center; }

    .check {
      width: 70px; height: 70px; border-radius: 50%; margin: 4px auto 12px; display:grid; place-items:center;
      background: radial-gradient(circle at 40% 40%, #fff, #fff5ec);
      border: 2px solid rgba(232,93,4,0.25);
      box-shadow: 0 10px 22px rgba(232,93,4,0.15);
    }
    .check svg { width: 36px; height: 36px; fill: none; stroke: var(--clr-primary); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

    .title { margin: 6px 0 4px; color: var(--clr-deep); font-weight: 800; font-size: 22px; }
    .lead { margin: 0 0 12px; color:#5a4a43; }

    .ref { display:inline-block; padding: 8px 12px; border-radius: 999px; background:#fff7f1; border:1px dashed rgba(232,93,4,0.35); color: #6c3b2a; font-weight:700; font-size: 14px; }

    .actions { margin-top: 16px; display:flex; gap:10px; justify-content:center; flex-wrap: wrap; }
    .btn-primary { appearance:none; border:none; background: linear-gradient(180deg, var(--clr-primary), var(--clr-primary-700)); color:#fff; padding: 12px 22px; border-radius:999px; font-weight:800; cursor:pointer; box-shadow: 0 10px 22px rgba(232,93,4,0.35); transition: transform var(--transition), box-shadow var(--transition); text-decoration:none; display:inline-block; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 26px rgba(232,93,4,0.45); }
    .btn-ghost { appearance:none; border:1px solid rgba(232,93,4,0.35); color:#6c3b2a; padding: 12px 18px; border-radius:999px; background:#fff; text-decoration:none; font-weight:800; }

    footer { text-align:center; color:#4b3a33; font-size: 13px; padding: 12px 0 22px; }
  </style>
</head>
<body>
  <header>
    <div class="container brand">
      <span class="badge" aria-hidden="true"></span>
      <div>
        <h1>تأكيد الطلب</h1>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="panel">
        <div class="check" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <p class="title">شكراً لطلبك!</p>
        <p class="lead">تم استلام طلبك بنجاح، وسنقوم بتجهيزه والتواصل معك عند الانطلاق للتوصيل.</p>
        <div class="ref" id="ref">رقم الطلب: <span id="code">—</span></div>
        <div class="actions">
          <a class="btn-primary" href="index.html">العودة إلى الرئيسية</a>
          <a class="btn-ghost" href="checkout.html">إنشاء طلب جديد</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">مطعم وذ ذيليشت — نتمنى لك وجبة شهية</div>
  </footer>

  <script>
    // توليد مرجع طلب بسيط من وقت الزيارة — للعرض فقط
    (function(){
      var p = new URLSearchParams(window.location.search);
      var name = (p.get('name') || 'عميلنا العزيز').trim();
      var base = Date.now().toString(36).toUpperCase().slice(-6);
      var code = 'WDZ-' + base;
      document.getElementById('code').textContent = code;
      document.title = 'شكراً يا ' + name + ' - تم استلام طلبك';
    })();
  </script>
</body>
</html>
